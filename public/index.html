<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop Pay</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- CSS - v2 forces fresh load -->
    <link rel="stylesheet" href="/css/style.css?v=2">

    <!-- Favicon / Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
    <div id="app">
        <!-- AUTH SECTION (Login/Register) -->
        <div id="auth-section" class="section">
            <div class="card">
                <h1>💰 Shop Pay</h1>
                <p>Payment solution for shop owners</p>
                <div id="auth-forms">
                    <!-- Login Form -->
                    <form id="login-form">
                        <h2>Login</h2>
                        <input type="email" id="login-email" placeholder="Email" required>
                        <input type="password" id="login-password" placeholder="Password" required>
                        <button type="submit">Login</button>
                        <p class="switch-link">Don't have an account? <a href="#" id="show-register">Register</a></p>
                    </form>
                    <!-- Register Form (hidden by default) -->
                    <form id="register-form" style="display:none;">
                        <h2>Register</h2>
                        <input type="text" id="reg-business" placeholder="Business Name" required>
                        <input type="email" id="reg-email" placeholder="Email" required>
                        <input type="password" id="reg-password" placeholder="Password" required>
                        <input type="tel" id="reg-phone" placeholder="Phone Number" inputmode="numeric" pattern="[0-9]*" required>
                        <button type="submit">Register</button>
                        <p class="switch-link">Already have an account? <a href="#" id="show-login">Login</a></p>
                    </form>
                </div>
                <div id="auth-message" class="message"></div>
            </div>
        </div>

        <!-- DASHBOARD SECTION (hidden by default) -->
        <div id="dashboard-section" class="section" style="display:none;">
            <div class="card">
                <div class="header">
                    <h1>
                        <img src="https://i.ibb.co/C5YJyZv3/mpesa.jpg" alt="M-PESA" class="mpesa-logo">
                        Shop Pay
                    </h1>
                    <div>
                        <span id="user-name">User</span>
                        <button id="logout-btn" class="logout-btn">Logout</button>
                    </div>
                </div>
                <hr>

                <!-- Tab Navigation -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="send-payment">💳 Send Payment</button>
                    <button class="tab-btn" data-tab="add-account">🔑 Add Account</button>
                    <button class="tab-btn" data-tab="history">📜 History</button>
                </div>

                <!-- Tab 1: Send Payment -->
                <div id="tab-send-payment" class="tab-content active">
                    <h3>Send STK Push Request</h3>
                    <form id="payment-form">
                        <label>Customer Phone (e.g., 0712345678)</label>
                        <input
                            type="tel"
                            id="pay-phone"
                            placeholder="0712345678"
                            inputmode="numeric"
                            pattern="[0-9]*"
                            required
                        >

                        <label>Amount (KES)</label>
                        <input
                            type="number"
                            id="pay-amount"
                            placeholder="100"
                            inputmode="numeric"
                            min="1"
                            step="1"
                            required
                        >

                        <label>Account Reference (Optional)</label>
                        <input type="text" id="pay-ref" placeholder="INV-001">

                        <button type="submit">Send Payment Request</button>
                    </form>
                    <div id="payment-result" class="message"></div>
                </div>

                <!-- Tab 2: Add Account -->
                <div id="tab-add-account" class="tab-content" style="display:none;">
                    <h3>Add M-PESA Account</h3>
                    <form id="account-form">
                        <label>Account Type</label>
                        <select id="acc-type">
                            <option value="paybill">Paybill</option>
                            <option value="till">Till</option>
                            <option value="pochi">Pochi la Biashara</option>
                            <option value="mpesa_number">M-PESA Number</option>
                        </select>
                        <label>Account Number</label>
                        <input type="text" id="acc-number" placeholder="123456" required>
                        <label>Consumer Key</label>
                        <input type="text" id="acc-key" placeholder="Consumer Key" required>
                        <label>Consumer Secret</label>
                        <input type="text" id="acc-secret" placeholder="Consumer Secret" required>
                        <label>Passkey (Paybill only)</label>
                        <input type="text" id="acc-passkey" placeholder="Passkey">
                        <button type="submit">Add Account</button>
                    </form>
                    <div id="account-result" class="message"></div>
                    <hr>
                    <h4>Your Accounts</h4>
                    <div id="account-list"></div>
                </div>

                <!-- Tab 3: History -->
                <div id="tab-history" class="tab-content" style="display:none;">
                    <h3>Transaction History</h3>
                    <div id="transaction-list">
                        <p>Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="/js/app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('✅ Service Worker registered successfully');
                    })
                    .catch(err => {
                        console.log('❌ Service Worker registration failed:', err);
                    });
            });
        }
    </script>
</body>
</html>
